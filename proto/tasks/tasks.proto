syntax = "proto3";
package tasks;
option go_package = "github.com/Vostok1611/project-protos/tasks";

message Task{
    string id      = 1;
    string title   = 2;
    string is_done = 3;
    string user_id = 4;                                                                             
}

message CreateTaskRequest{
    string title = 1;
    string is_done = 2;
    string user_id = 3;
}

message CreateTaskResponse{
    Task task = 1;
}

message GetTaskByIdRequest{
    string id = 1;
}

message GetTaskByIdResponse{
    Task task = 1;
}

message GetAllTasksRequest{}

message GetAllTasksResponse{
    repeated Task tasks = 1;
}

message GetTasksByUserRequest{
    string user_id = 1;
}

message GetTasksByUserResponse{
    repeated Task tasks = 1;
}

message UpdateTaskRequest{
    string id               = 1;
    optional string title   = 2;
    optional string is_done = 3;
}

message UpdateTaskResponse{
    Task task = 1;
}

message DeleteTaskRequest{
    string id = 1;
}

message DeleteTaskResponse{
    bool success = 1;
}

service TaskService{
    rpc CreateTask      (CreateTaskRequest)     returns (CreateTaskResponse);
    rpc GetTaskById     (GetTaskByIdRequest)    returns (GetTaskByIdResponse);
    rpc GetAllTasks     (GetAllTasksRequest)    returns (GetAllTasksResponse); 
    rpc UpdateTask      (UpdateTaskRequest)     returns (UpdateTaskResponse);
    rpc DeleteTask      (DeleteTaskRequest)     returns (DeleteTaskResponse);
    rpc GetTasksByUser  (GetTasksByUserRequest) returns (GetTasksByUserResponse);
}